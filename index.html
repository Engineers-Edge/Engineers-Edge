<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Engineers Edge</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      background: #121212;
      color: white;
      font-family: Arial;
      padding: 20px;
    }

    .card {
      background: #1E1E1E;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      background: #222;
      color: white;
      border: none;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      background: #00c853;
      border: none;
      color: white;
      font-weight: bold;
    }

    .stats {
      display: flex;
      gap: 10px;
    }

    .stat {
      flex: 1;
      text-align: center;
    }

    img {
      max-width: 200px;
    }
  </style>
</head>
<body>

<div style="text-align:center;">
  <img src="logo.png">
</div>

<div class="card stats">
  <div class="stat">
    <div>Profit</div>
    <h3 id="profit">0</h3>
  </div>
  <div class="stat">
    <div>Winrate</div>
    <h3 id="winrate">0%</h3>
  </div>
  <div class="stat">
    <div>Trades</div>
    <h3 id="trades">0</h3>
  </div>
</div>

<div class="card">
  <canvas id="chart"></canvas>
</div>

<div class="card">
  <input id="profitInput" type="number" placeholder="Profit / Loss">
  <button onclick="addTrade()">SAVE</button>
</div>

<div id="history"></div>

<script>
let data = JSON.parse(localStorage.getItem("trades")) || [];

function saveData() {
  localStorage.setItem("trades", JSON.stringify(data));
}

function addTrade() {
  let value = parseFloat(document.getElementById("profitInput").value);
  if (isNaN(value)) return;

  data.push({
    profit: value,
    date: new Date().toISOString()
  });

  saveData();
  document.getElementById("profitInput").value = "";
  render();
}

function render() {
  let total = data.reduce((a, b) => a + b.profit, 0);
  let wins = data.filter(t => t.profit > 0).length;

  document.getElementById("profit").innerText = total.toFixed(0);
  document.getElementById("winrate").innerText =
    data.length ? ((wins / data.length) * 100).toFixed(0) + "%" : "0%";
  document.getElementById("trades").innerText = data.length;

  let balance = 0;
  let chartData = data.map((t, i) => {
    balance += t.profit;
    return balance;
  });

  new Chart(document.getElementById("chart"), {
    type: "line",
    data: {
      labels: chartData.map((_, i) => i + 1),
      datasets: [{
        data: chartData,
        borderColor: "#00c853"
      }]
    },
    options: {
      plugins: { legend: { display: false } }
    }
  });

  let html = "";
  data.slice().reverse().forEach(t => {
    html += `
      <div class="card">
        ${t.date.substring(0,10)} 
        <span style="float:right;color:${t.profit>=0?'#00c853':'#ff5252'}">
          ${t.profit}
        </span>
      </div>
    `;
  });

  document.getElementById("history").innerHTML = html;
}

render();
</script>

</body>
</html>
